name: Coverage Testing

on: [workflow_dispatch, push, pull_request]

permissions: read-all

jobs:
  Coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Setup SQL Server
        uses: potatoqualitee/mssqlsuite@v1.8
        with:
          install: sqlengine, sqlclient, sqlpackage

      - name: Create Mock Dynamics GP Database
        run: |
          sqlcmd -S localhost -U sa -P dbatools.I0 -d tempdb -Q "create database Dynamics" -C
          sqlcmd -S localhost -U sa -P dbatools.I0 -d Dynamics -i test/createTables.sql -C

      - name: Install Package
        run: |
          npm ci
          npm install -g c8

      - name: Copy Test Config
        run: cp ./test/config.github.js ./test/config.js

      - name: Run Coverage Testing
        run: npm run coverage

      - name: Codecov
        if: ${{ github.event_name != 'pull_request' && env.CODECOV_TOKEN != '' && matrix.node == 22 }}
        run: |
          curl -Os https://uploader.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov -t ${CODECOV_TOKEN}
